<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="npnArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <text x="300" y="18" font-size="16" text-anchor="middle" fill="currentColor" stroke="none">NPN Common-Emitter Amplifier</text>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- +V rail -->
    <line x1="110" y1="55" x2="290" y2="55"/>

    <!-- R1, base bias upper resistor -->
    <path d="M150,55 L150,67 L157,75 L143,89 L157,103 L143,117 L157,131 L143,145 L150,153 L150,165"/>
    <!-- R2, base bias lower resistor -->
    <path d="M150,165 L150,175 L157,183 L143,195 L157,207 L143,219 L150,227 L150,245"/>
    <!-- R2 to ground -->
    <line x1="150" y1="245" x2="150" y2="255"/>
    <line x1="138" y1="255" x2="162" y2="255"/>
    <line x1="142" y1="259" x2="158" y2="259"/>
    <line x1="146" y1="263" x2="154" y2="263"/>

    <!-- base node junction dot -->
    <circle cx="150" cy="165" r="3" fill="currentColor" stroke="none"/>

    <!-- Cin: input coupling cap on base wire -->
    <line x1="150" y1="165" x2="130" y2="165"/>
    <line x1="126" y1="158" x2="126" y2="172"/>
    <line x1="120" y1="158" x2="120" y2="172"/>
    <line x1="120" y1="165" x2="70" y2="165"/>
    <circle cx="70" cy="165" r="3" fill="currentColor" stroke="none"/>

    <!-- base lead to transistor -->
    <line x1="150" y1="165" x2="210" y2="165"/>

    <!-- transistor envelope -->
    <circle cx="220" cy="165" r="30"/>
    <!-- base bar -->
    <line x1="210" y1="150" x2="210" y2="180" stroke-width="2.5"/>
    <!-- collector lead -->
    <line x1="210" y1="153" x2="230" y2="135"/>
    <line x1="230" y1="135" x2="230" y2="85"/>
    <!-- emitter lead, arrow points away from base = NPN -->
    <line x1="210" y1="177" x2="230" y2="195" marker-end="url(#npnArrow)"/>
    <line x1="230" y1="195" x2="230" y2="245"/>

    <!-- Rc, collector resistor -->
    <path d="M230,55 L230,60 L237,65 L223,72 L237,79 L230,84 L230,85"/>
    <!-- collector output-tap junction -->
    <circle cx="230" cy="85" r="3" fill="currentColor" stroke="none"/>

    <!-- Cout: output coupling cap -->
    <line x1="230" y1="85" x2="350" y2="85"/>
    <line x1="350" y1="78" x2="350" y2="92"/>
    <line x1="356" y1="78" x2="356" y2="92"/>
    <line x1="356" y1="85" x2="465" y2="85"/>
    <circle cx="465" cy="85" r="3" fill="currentColor" stroke="none"/>

    <!-- Re, emitter resistor -->
    <path d="M230,245 L230,250 L237,255 L223,262 L237,269 L230,274 L230,275"/>
    <!-- bus from emitter node to Ce branch -->
    <line x1="230" y1="245" x2="270" y2="245"/>
    <!-- Ce, emitter bypass cap (parallel with Re) -->
    <line x1="270" y1="245" x2="270" y2="255"/>
    <line x1="260" y1="255" x2="280" y2="255"/>
    <line x1="260" y1="261" x2="280" y2="261"/>
    <line x1="270" y1="261" x2="270" y2="275"/>
    <!-- bottom bus tying Re and Ce to ground -->
    <line x1="230" y1="275" x2="270" y2="275"/>
    <line x1="250" y1="275" x2="250" y2="285"/>
    <line x1="238" y1="285" x2="262" y2="285"/>
    <line x1="242" y1="289" x2="258" y2="289"/>
    <line x1="246" y1="293" x2="254" y2="293"/>
  </g>

  <g fill="currentColor" stroke="none">
    <text x="118" y="46" font-size="12">+V</text>

    <text x="168" y="95" font-size="11">R1</text>
    <text x="168" y="195" font-size="11">R2</text>
    <text x="245" y="68" font-size="11">RC</text>
    <text x="245" y="260" font-size="11">RE</text>
    <text x="283" y="252" font-size="11">CE</text>
    <text x="123" y="150" font-size="11" text-anchor="middle">CIN</text>
    <text x="353" y="70" font-size="11">COUT</text>

    <text x="70" y="185" font-size="11" text-anchor="middle">AUDIO IN</text>
    <text x="465" y="105" font-size="11" text-anchor="middle">AUDIO OUT</text>

    <text x="250" y="305" font-size="10" text-anchor="middle">GND</text>

    <text x="262" y="158" font-size="12">Q1</text>
    <text x="262" y="172" font-size="10">(NPN)</text>

    <text x="196" y="177" font-size="10" text-anchor="middle">B</text>
    <text x="242" y="118" font-size="10" text-anchor="middle">C</text>
    <text x="242" y="222" font-size="10" text-anchor="middle">E</text>
  </g>
</svg>
