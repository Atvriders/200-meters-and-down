<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
<g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Antenna -->
  <line x1="55" y1="30" x2="55" y2="90"/>
  <line x1="55" y1="30" x2="38" y2="12"/>
  <line x1="55" y1="30" x2="55" y2="8"/>
  <line x1="55" y1="30" x2="72" y2="12"/>
  <line x1="55" y1="90" x2="55" y2="110"/>
  <line x1="55" y1="110" x2="78" y2="110"/>

  <!-- Antenna coupling capacitor (small, in series to tank) -->
  <line x1="88" y1="102" x2="88" y2="118"/>
  <line x1="96" y1="102" x2="96" y2="118"/>
  <line x1="78" y1="110" x2="88" y2="110"/>
  <line x1="96" y1="110" x2="150" y2="110"/>

  <!-- Grid tank circuit: L1 (grid coil) -->
  <path d="M 150.0,110.0 C 163.0,110.0 163.0,120.0 150.0,120.0 C 137.0,120.0 137.0,130.0 150.0,130.0 C 163.0,130.0 163.0,140.0 150.0,140.0 C 137.0,140.0 137.0,150.0 150.0,150.0 C 163.0,150.0 163.0,160.0 150.0,160.0 C 137.0,160.0 137.0,170.0 150.0,170.0 C 163.0,170.0 163.0,180.0 150.0,180.0 C 137.0,180.0 137.0,190.0 150.0,190.0 C 163.0,190.0 163.0,200.0 150.0,200.0 C 137.0,200.0 137.0,210.0 150.0,210.0"/>

  <!-- Tuning capacitor C1 (variable), in parallel with L1 -->
  <line x1="150" y1="110" x2="195" y2="110"/>
  <line x1="195" y1="110" x2="195" y2="148"/>
  <line x1="180" y1="148" x2="210" y2="148"/>
  <line x1="180" y1="162" x2="210" y2="162"/>
  <line x1="195" y1="162" x2="195" y2="210"/>
  <line x1="150" y1="210" x2="195" y2="210"/>
  <!-- variable-capacitor arrow -->
  <line x1="172" y1="176" x2="216" y2="140" stroke-width="1.6"/>
  <line x1="216" y1="140" x2="209" y2="141" stroke-width="1.6"/>
  <line x1="216" y1="140" x2="212" y2="147" stroke-width="1.6"/>

  <!-- Tickler coil L2, close to L1 for magnetic coupling -->
  <path d="M 108.0,130.0 C 119.0,130.0 119.0,140.0 108.0,140.0 C 97.0,140.0 97.0,150.0 108.0,150.0 C 119.0,150.0 119.0,160.0 108.0,160.0 C 97.0,160.0 97.0,170.0 108.0,170.0 C 119.0,170.0 119.0,180.0 108.0,180.0 C 97.0,180.0 97.0,190.0 108.0,190.0"/>

  <!-- coupling indicator between L1 and L2 -->
  <path d="M 127,145 Q 133,160 127,175" stroke-width="1.6" stroke-dasharray="3,3"/>
  <path d="M 133,145 Q 139,160 133,175" stroke-width="1.6" stroke-dasharray="3,3"/>

  <!-- feedback arrow: tickler back to grid coil -->
  <path d="M 108,196 C 90,225 118,240 148,216" stroke-width="1.6" stroke-dasharray="4,3"/>
  <path d="M 148,216 L 140,213" stroke-width="1.6"/>
  <path d="M 148,216 L 144,224" stroke-width="1.6"/>

  <!-- L2 top lead: up and over to plate -->
  <line x1="108" y1="130" x2="108" y2="55"/>
  <line x1="108" y1="55" x2="330" y2="55"/>

  <!-- L2 bottom lead: down and over to phones/regen/B+ -->
  <line x1="108" y1="190" x2="108" y2="250"/>
  <line x1="108" y1="250" x2="234" y2="250"/>

  <!-- Grid circuit: cap and grid-leak in parallel, tank top to grid -->
  <line x1="195" y1="110" x2="210" y2="110"/>
  <!-- cap branch (top path) -->
  <path d="M 210,110 L 210,98 L 250,98 L 250,110"/>
  <line x1="228" y1="90" x2="228" y2="106"/>
  <line x1="236" y1="90" x2="236" y2="106"/>
  <!-- resistor branch (bottom path) -->
  <path d="M 210,110 L 210,124 L 218,120 L 226,128 L 234,120 L 242,128 L 250,124 L 250,110"/>
  <!-- rejoin, to grid lead -->
  <line x1="250" y1="110" x2="285" y2="110"/>
  <line x1="285" y1="110" x2="285" y2="160"/>

  <!-- Triode envelope -->
  <circle cx="330" cy="160" r="45"/>
  <!-- plate -->
  <line x1="305" y1="128" x2="355" y2="128"/>
  <line x1="330" y1="115" x2="330" y2="128"/>
  <line x1="330" y1="115" x2="330" y2="55"/>
  <!-- grid (dashed mesh) -->
  <line x1="300" y1="160" x2="360" y2="160" stroke-dasharray="6,4"/>
  <line x1="285" y1="160" x2="300" y2="160"/>
  <!-- cathode (hairpin) -->
  <path d="M 308,188 L 308,198 L 352,198 L 352,188"/>
  <line x1="330" y1="198" x2="330" y2="205"/>
  <line x1="330" y1="205" x2="330" y2="300"/>

  <!-- Phones (headphone symbol) -->
  <circle cx="250" cy="250" r="16"/>
  <circle cx="250" cy="250" r="5"/>
  <line x1="234" y1="250" x2="245" y2="250"/>
  <line x1="255" y1="250" x2="266" y2="250"/>

  <!-- Regeneration control (variable resistor / rheostat) in the B+ feed -->
  <line x1="266" y1="250" x2="330" y2="250"/>
  <rect x="330" y="242" width="60" height="16"/>
  <line x1="326" y1="264" x2="392" y2="234" stroke-width="1.6"/>
  <line x1="392" y1="234" x2="384" y2="236" stroke-width="1.6"/>
  <line x1="392" y1="234" x2="390" y2="242" stroke-width="1.6"/>

  <!-- B+ battery -->
  <line x1="390" y1="250" x2="412" y2="250"/>
  <line x1="415" y1="232" x2="415" y2="268"/>
  <line x1="425" y1="240" x2="425" y2="260" stroke-width="5"/>
  <line x1="425" y1="250" x2="460" y2="250"/>
  <line x1="460" y1="250" x2="460" y2="300"/>

  <!-- Common return rail -->
  <line x1="90" y1="300" x2="460" y2="300"/>
  <line x1="150" y1="210" x2="150" y2="300"/>

  <!-- Ground symbol -->
  <line x1="110" y1="300" x2="110" y2="310"/>
  <line x1="98" y1="310" x2="122" y2="310"/>
  <line x1="102" y1="316" x2="118" y2="316"/>
  <line x1="106" y1="322" x2="114" y2="322"/>

  <!-- junction dots -->
  <g fill="currentColor" stroke="none">
    <circle cx="78" cy="110" r="2.6"/>
    <circle cx="150" cy="110" r="2.6"/>
    <circle cx="195" cy="110" r="2.6"/>
    <circle cx="150" cy="210" r="2.6"/>
    <circle cx="195" cy="210" r="2.6"/>
    <circle cx="210" cy="110" r="2.6"/>
    <circle cx="250" cy="110" r="2.6"/>
    <circle cx="330" cy="55" r="2.6"/>
    <circle cx="108" cy="55" r="2.6"/>
    <circle cx="108" cy="250" r="2.6"/>
    <circle cx="150" cy="300" r="2.6"/>
    <circle cx="330" cy="300" r="2.6"/>
    <circle cx="460" cy="300" r="2.6"/>
    <circle cx="110" cy="300" r="2.6"/>
  </g>
</g>

<!-- Labels -->
<g fill="currentColor" stroke="none" font-size="13">
  <text x="62" y="24">ANT</text>
  <text x="80" y="88" font-size="9" text-anchor="middle">coupling&#160;C</text>
  <text x="120" y="100" text-anchor="middle">L1</text>
  <text x="120" y="114" text-anchor="middle" font-size="11">grid&#160;coil</text>
  <text x="222" y="182" text-anchor="middle">C1</text>
  <text x="222" y="196" text-anchor="middle" font-size="11">tuning</text>
  <text x="70" y="153" text-anchor="middle">L2</text>
  <text x="70" y="166" text-anchor="middle" font-size="11">tickler</text>
  <text x="60" y="222" font-size="11">regeneration</text>
  <text x="60" y="235" font-size="11">feedback</text>
  <text x="196" y="82" font-size="11" text-anchor="middle">grid&#160;cap</text>
  <text x="230" y="146" font-size="11" text-anchor="middle">grid&#160;leak&#160;R</text>
  <text x="392" y="150" font-size="13">V1</text>
  <text x="392" y="165" font-size="11">triode&#160;detector</text>
  <text x="278" y="120" font-size="10" text-anchor="middle">plate</text>
  <text x="264" y="176" font-size="10" text-anchor="middle">grid</text>
  <text x="336" y="212" font-size="10">cathode</text>
  <text x="250" y="286" text-anchor="middle" font-size="12">Phones</text>
  <text x="360" y="224" text-anchor="middle" font-size="12">Regeneration</text>
  <text x="360" y="278" text-anchor="middle" font-size="11">control</text>
  <text x="437" y="222" text-anchor="middle" font-size="12">B+</text>
  <text x="437" y="336" text-anchor="middle" font-size="11">plate&#160;battery</text>
  <text x="112" y="340" text-anchor="middle" font-size="12">GND</text>
</g>
</svg>
