<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" color="currentColor">
  <!-- ============ SPARK-GAP DIPOLE OSCILLATOR (left) ============ -->
  <text x="160" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="currentColor">Spark-gap dipole oscillator</text>

  <!-- capacity spheres -->
  <circle cx="50" cy="140" r="16" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="270" cy="140" r="16" fill="none" stroke="currentColor" stroke-width="2"/>
  <text x="50" y="100" text-anchor="middle" font-size="11" fill="currentColor">capacity sphere</text>
  <line x1="50" y1="106" x2="50" y2="123" stroke="currentColor" stroke-width="1"/>
  <text x="270" y="100" text-anchor="middle" font-size="11" fill="currentColor">capacity sphere</text>
  <line x1="270" y1="106" x2="270" y2="123" stroke="currentColor" stroke-width="1"/>

  <!-- rods -->
  <line x1="66" y1="140" x2="148" y2="140" stroke="currentColor" stroke-width="2"/>
  <line x1="172" y1="140" x2="254" y2="140" stroke="currentColor" stroke-width="2"/>

  <!-- oscillator spark gap: terminal dots + jagged spark -->
  <circle cx="148" cy="140" r="4" fill="currentColor"/>
  <circle cx="172" cy="140" r="4" fill="currentColor"/>
  <path d="M148,140 L152,133 L157,146 L161,131 L165,148 L169,134 L172,140"
        fill="none" stroke="currentColor" stroke-width="1.3"/>
  <text x="160" y="98" text-anchor="middle" font-size="11" fill="currentColor">spark gap</text>
  <line x1="160" y1="104" x2="160" y2="130" stroke="currentColor" stroke-width="1"/>

  <!-- feed wires down to induction coil -->
  <line x1="110" y1="140" x2="110" y2="235" stroke="currentColor" stroke-width="1.5"/>
  <line x1="210" y1="140" x2="210" y2="235" stroke="currentColor" stroke-width="1.5"/>

  <!-- induction (Ruhmkorff) coil box -->
  <rect x="85" y="235" width="155" height="50" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
  <path d="M100,260 A10,10 0 0 1 120,260 A10,10 0 0 1 140,260 A10,10 0 0 1 160,260 A10,10 0 0 1 180,260 A10,10 0 0 1 200,260 A10,10 0 0 1 220,260"
        fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="162" y="303" text-anchor="middle" font-size="11" fill="currentColor">induction coil (Ruhmkorff coil)</text>

  <!-- ============ RADIATED WAVE ============ -->
  <polyline points="322.3,126.5 324.2,129.3 325.7,132.5 326.6,135.8 327.0,139.2 326.8,142.7 326.1,146.1 324.9,149.3 323.2,152.3"
            fill="none" stroke="currentColor" stroke-width="1.5"/>
  <polyline points="338.1,114.1 341.7,119.6 344.5,125.6 346.2,132.0 347.0,138.5 346.7,145.1 345.4,151.6 343.1,157.7 339.8,163.5"
            fill="none" stroke="currentColor" stroke-width="1.5"/>
  <polyline points="353.9,101.8 359.2,109.9 363.3,118.8 365.9,128.2 367.0,137.8 366.5,147.6 364.6,157.1 361.2,166.2 356.4,174.7"
            fill="none" stroke="currentColor" stroke-width="1.5"/>
  <path d="M372,140 L360,133 L360,147 Z" fill="currentColor"/>
  <text x="345" y="66" text-anchor="middle" font-size="11" fill="currentColor">radiated EM wave</text>

  <!-- ============ RESONANT LOOP (right) ============ -->
  <text x="480" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="currentColor">Resonant loop (resonator)</text>
  <polyline points="405.9,138.3 408.7,126.8 413.2,116.0 419.3,105.9 427.0,97.0 435.9,89.3 446.0,83.2 456.8,78.7 468.3,75.9 480.0,75.0 491.7,75.9 503.2,78.7 514.0,83.2 524.1,89.3 533.0,97.0 540.7,105.9 546.8,116.0 551.3,126.8 554.1,138.3 555.0,150.0 554.1,161.7 551.3,173.2 546.8,184.0 540.7,194.1 533.0,203.0 524.1,210.7 514.0,216.8 503.2,221.3 491.7,224.1 480.0,225.0 468.3,224.1 456.8,221.3 446.0,216.8 435.9,210.7 427.0,203.0 419.3,194.1 413.2,184.0 408.7,173.2 405.9,161.7"
            fill="none" stroke="currentColor" stroke-width="2.5"/>

  <!-- loop micro-gap: terminal dots + jagged spark -->
  <circle cx="405.9" cy="138.3" r="4" fill="currentColor"/>
  <circle cx="405.9" cy="161.7" r="4" fill="currentColor"/>
  <path d="M405.9,138.3 L411,142.5 L401,146.7 L411,150.8 L401,155.0 L411,158.5 L405.9,161.7"
        fill="none" stroke="currentColor" stroke-width="1.3"/>

  <text x="330" y="320" font-size="11" fill="currentColor">micro-gap</text>
  <text x="330" y="334" font-size="11" fill="currentColor">(spark observed here)</text>
  <path d="M360,318 C390,300 395,220 403,157" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
