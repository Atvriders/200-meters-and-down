<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
<title>Figure 3.4 — The elements of a pentode vacuum tube</title>

<g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">

  <!-- Cutaway cross-section: concentric electrodes, cathode at centre out to the glass envelope -->
  <circle cx="240" cy="210" r="150" stroke-width="1.5"/>
  <circle cx="240" cy="210" r="125" stroke-width="3"/>
  <circle cx="240" cy="210" r="100" stroke-width="1.6" stroke-dasharray="3,4"/>
  <circle cx="240" cy="210" r="78" stroke-width="1.6" stroke-dasharray="6,3"/>
  <circle cx="240" cy="210" r="55" stroke-width="1.6" stroke-dasharray="2,2"/>
  <circle cx="240" cy="210" r="25" stroke-width="2.2"/>
  <circle cx="240" cy="210" r="5" fill="currentColor" stroke="none"/>

  <!-- Leader lines from each electrode to its label row -->
  <g stroke-width="1">
    <line x1="291.3" y1="69" x2="460" y2="60"/>
    <line x1="328.4" y1="121.6" x2="460" y2="110"/>
    <line x1="334" y1="175.8" x2="460" y2="160"/>
    <line x1="317.7" y1="216.8" x2="460" y2="210"/>
    <line x1="261.65" y1="222.5" x2="460" y2="260"/>
    <line x1="271.55" y1="255.06" x2="460" y2="310"/>
  </g>
  <g fill="currentColor" stroke="none">
    <circle cx="291.3" cy="69" r="2.6"/>
    <circle cx="328.4" cy="121.6" r="2.6"/>
    <circle cx="334" cy="175.8" r="2.6"/>
    <circle cx="317.7" cy="216.8" r="2.6"/>
    <circle cx="261.65" cy="222.5" r="2.6"/>
    <circle cx="271.55" cy="255.06" r="2.6"/>
  </g>

  <!-- Electron flow: cathode outward through the three grids to the plate -->
  <line x1="214" y1="225" x2="136" y2="270" stroke-width="2"/>
  <path d="M136,270 L141,262 L146,270 Z" fill="currentColor" stroke="none"/>
  <line x1="75" y1="308" x2="167" y2="252" stroke-width="1" stroke-dasharray="3,3"/>

</g>

<!-- Labels -->
<g fill="currentColor" stroke="none" font-size="13">
  <text x="468" y="57">ENVELOPE (glass)</text>
  <text x="468" y="107">PLATE (anode)</text>
  <text x="468" y="157">SUPPRESSOR GRID</text>
  <text x="468" y="207">SCREEN GRID</text>
  <text x="468" y="257">CATHODE (heated)</text>
  <text x="468" y="307">CONTROL GRID</text>

  <text x="46" y="317" font-size="12">ELECTRON FLOW</text>
</g>

</svg>
