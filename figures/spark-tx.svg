<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Helvetica, Arial, sans-serif">
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== Source: AC / induction-coil ===== -->
    <circle cx="90" cy="200" r="38"/>
    <path d="M62,200 Q76,178 90,200 Q104,222 118,200" stroke-width="1.6"/>
    <!-- source terminals -->
    <line x1="90" y1="162" x2="90" y2="100"/>
    <line x1="90" y1="238" x2="90" y2="300"/>

    <!-- top rail: source -> key -->
    <line x1="90" y1="100" x2="150" y2="100"/>

    <!-- ===== Telegraph key (open switch) ===== -->
    <circle cx="150" cy="100" r="2.5" fill="currentColor" stroke="none"/>
    <line x1="150" y1="100" x2="176" y2="76"/>
    <circle cx="176" cy="76" r="4" fill="currentColor" stroke="none"/>
    <circle cx="206" cy="100" r="2.5" fill="currentColor" stroke="none"/>
    <line x1="206" y1="100" x2="230" y2="100"/>

    <!-- node A -->
    <circle cx="230" cy="100" r="2.5" fill="currentColor" stroke="none"/>

    <!-- ===== Spark gap ===== -->
    <line x1="230" y1="100" x2="245" y2="100"/>
    <line x1="245" y1="88" x2="245" y2="112"/>
    <path d="M249,100 L253,92 L257,108 L261,100" stroke-width="1.3"/>
    <line x1="263" y1="88" x2="263" y2="112"/>
    <line x1="263" y1="100" x2="290" y2="100"/>

    <!-- node B: top of primary L1 -->
    <circle cx="290" cy="100" r="2.5" fill="currentColor" stroke="none"/>

    <!-- ===== C1: primary (charging) condenser, branch off node A ===== -->
    <line x1="230" y1="100" x2="230" y2="183"/>
    <line x1="213" y1="183" x2="247" y2="183"/>
    <line x1="213" y1="195" x2="247" y2="195"/>
    <line x1="230" y1="195" x2="230" y2="300"/>
    <circle cx="230" cy="300" r="2.5" fill="currentColor" stroke="none"/>

    <!-- bottom rail: source -> C1 -> L1 -->
    <line x1="90" y1="300" x2="290" y2="300"/>
    <circle cx="290" cy="300" r="2.5" fill="currentColor" stroke="none"/>

    <!-- ===== L1 primary coil (270..300 style, x=290) ===== -->
    <path d="M290,100 Q312,120 290,140 Q268,160 290,180 Q312,200 290,220 Q268,240 290,260 Q312,280 290,300" stroke-width="2.2"/>

    <!-- ===== transformer core marks ===== -->
    <line x1="316" y1="150" x2="316" y2="250" stroke-dasharray="4,5" stroke-width="1.3"/>
    <line x1="326" y1="150" x2="326" y2="250" stroke-dasharray="4,5" stroke-width="1.3"/>

    <!-- ===== L2 secondary coil, x=360 ===== -->
    <path d="M360,100 Q382,120 360,140 Q338,160 360,180 Q382,200 360,220 Q338,240 360,260 Q382,280 360,300" stroke-width="2.2"/>
    <circle cx="360" cy="100" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="360" cy="300" r="2.5" fill="currentColor" stroke="none"/>

    <!-- top rail: L2 -> C2 tap -> antenna riser -->
    <line x1="360" y1="100" x2="460" y2="100"/>
    <!-- bottom rail: L2 -> C2 tap -> ground riser -->
    <line x1="360" y1="300" x2="460" y2="300"/>

    <!-- ===== C2 variable tuning condenser, branch at x=430 ===== -->
    <circle cx="430" cy="100" r="2.5" fill="currentColor" stroke="none"/>
    <line x1="430" y1="100" x2="430" y2="138"/>
    <line x1="413" y1="138" x2="447" y2="138"/>
    <line x1="413" y1="150" x2="447" y2="150"/>
    <line x1="430" y1="150" x2="430" y2="300"/>
    <circle cx="430" cy="300" r="2.5" fill="currentColor" stroke="none"/>
    <!-- variable-component arrow -->
    <line x1="404" y1="160" x2="452" y2="128" stroke-width="1.6"/>
    <path d="M452,128 L444,130 M452,128 L448,136" stroke-width="1.6"/>

    <!-- ===== Antenna riser + flat-top ===== -->
    <line x1="460" y1="100" x2="460" y2="46"/>
    <line x1="460" y1="46" x2="530" y2="46"/>
    <circle cx="460" cy="46" r="3" fill="currentColor" stroke="none"/>
    <circle cx="530" cy="46" r="3" fill="currentColor" stroke="none"/>
    <path d="M492,34 L502,24 M504,34 L514,24 M516,34 L526,24" stroke-width="1.3"/>

    <!-- ===== Ground riser + symbol ===== -->
    <line x1="460" y1="300" x2="460" y2="348"/>
    <line x1="440" y1="348" x2="480" y2="348"/>
    <line x1="447" y1="356" x2="473" y2="356"/>
    <line x1="454" y1="364" x2="466" y2="364"/>

  </g>

  <!-- ===== Labels ===== -->
  <g fill="currentColor" stroke="none" font-size="11">
    <text x="100" y="120" text-anchor="start" font-size="11">INDUCTION COIL</text>
    <text x="100" y="134" text-anchor="start" font-size="11">(AC SOURCE)</text>

    <text x="176" y="60" text-anchor="middle" font-size="10.5">TELEGRAPH KEY</text>

    <text x="254" y="72" text-anchor="middle" font-size="11">SPARK GAP</text>

    <text x="253" y="192" text-anchor="start" font-size="11">C1</text>

    <text x="255" y="165" text-anchor="end" font-size="12" font-weight="bold">L1</text>
    <text x="325" y="322" text-anchor="middle" font-size="10">OSCILLATION TRANSFORMER</text>
    <text x="381" y="165" text-anchor="start" font-size="12" font-weight="bold">L2</text>

    <text x="453" y="146" text-anchor="start" font-size="11">C2</text>
    <text x="453" y="160" text-anchor="start" font-size="9">(VARIABLE)</text>

    <text x="495" y="18" text-anchor="middle" font-size="11">ANTENNA</text>
    <text x="460" y="383" text-anchor="middle" font-size="11">GROUND</text>

    <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="bold">SPARK-GAP TRANSMITTER</text>
  </g>
</svg>
