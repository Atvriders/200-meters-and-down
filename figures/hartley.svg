<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
<g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Tapped tank coil: L1 (grid half) + L2 (plate half), one continuous winding -->
  <path d="M 170.0,140.0 C 170.0,153.0 191.7,153.0 191.7,140.0 C 191.7,127.0 213.3,127.0 213.3,140.0 C 213.3,153.0 235.0,153.0 235.0,140.0 C 235.0,127.0 256.7,127.0 256.7,140.0 C 256.7,153.0 278.3,153.0 278.3,140.0 C 278.3,127.0 300.0,127.0 300.0,140.0"/>
  <path d="M 300.0,140.0 C 300.0,153.0 321.7,153.0 321.7,140.0 C 321.7,127.0 343.3,127.0 343.3,140.0 C 343.3,153.0 365.0,153.0 365.0,140.0 C 365.0,127.0 386.7,127.0 386.7,140.0 C 386.7,153.0 408.3,153.0 408.3,140.0 C 408.3,127.0 430.0,127.0 430.0,140.0"/>

  <!-- centre tap down to cathode -->
  <line x1="300" y1="140" x2="300" y2="185"/>

  <!-- tank capacitor C, across the whole coil (grid end to plate end) -->
  <line x1="170" y1="140" x2="170" y2="95"/>
  <line x1="430" y1="140" x2="430" y2="95"/>
  <line x1="170" y1="95" x2="245" y2="95"/>
  <line x1="355" y1="95" x2="430" y2="95"/>
  <line x1="245" y1="80" x2="245" y2="110"/>
  <line x1="255" y1="80" x2="255" y2="110"/>
  <line x1="255" y1="95" x2="355" y2="95"/>

  <!-- grid end of coil down through grid-leak resistor to the grid -->
  <line x1="170" y1="140" x2="130" y2="140"/>
  <line x1="130" y1="140" x2="130" y2="160"/>
  <path d="M 130,160 L 130,172 L 138,168 L 122,176 L 138,180 L 122,184 L 130,180 L 130,192"/>
  <line x1="130" y1="192" x2="130" y2="230"/>
  <line x1="130" y1="230" x2="200" y2="230"/>
  <line x1="200" y1="230" x2="200" y2="185"/>

  <!-- Triode envelope -->
  <circle cx="260" cy="230" r="45"/>
  <!-- grid (dashed mesh), left side -->
  <line x1="200" y1="230" x2="230" y2="230" stroke-dasharray="6,4"/>
  <!-- plate, top -->
  <line x1="235" y1="205" x2="285" y2="205"/>
  <line x1="260" y1="185" x2="260" y2="205"/>
  <line x1="260" y1="185" x2="260" y2="140"/>
  <!-- plate lead runs to the plate end of the tank coil -->
  <line x1="260" y1="140" x2="430" y2="140"/>
  <!-- cathode, bottom (hairpin) -->
  <path d="M 238,258 L 238,268 L 282,268 L 282,258"/>
  <line x1="260" y1="268" x2="260" y2="275"/>

  <!-- cathode / centre-tap common rail down to ground -->
  <line x1="260" y1="275" x2="260" y2="330"/>
  <line x1="300" y1="185" x2="300" y2="330"/>
  <line x1="200" y1="330" x2="475" y2="330"/>

  <!-- B+ supply feeds the plate end of the tank through an RF choke -->
  <line x1="430" y1="140" x2="470" y2="140"/>
  <path d="M 470,140 C 483,140 483,150 470,150 C 457,150 457,160 470,160 C 483,160 483,170 470,170 C 457,170 457,180 470,180 C 483,180 483,190 470,190"/>
  <line x1="470" y1="190" x2="470" y2="228"/>
  <line x1="470" y1="228" x2="470" y2="238" stroke-width="1.6"/>
  <line x1="455" y1="238" x2="485" y2="238" stroke-width="2.4"/>
  <line x1="460" y1="248" x2="480" y2="248" stroke-width="5.5"/>
  <line x1="470" y1="248" x2="470" y2="330"/>

  <!-- output link to antenna, loosely coupled to the plate-side coil L2 -->
  <path d="M 400,108 C 392,120 392,130 400,140" stroke-dasharray="3,3" stroke-width="1.6"/>
  <line x1="520" y1="80" x2="520" y2="200"/>
  <line x1="520" y1="80" x2="504" y2="62"/>
  <line x1="520" y1="80" x2="520" y2="58"/>
  <line x1="520" y1="80" x2="536" y2="62"/>
  <line x1="520" y1="200" x2="520" y2="330"/>
  <line x1="520" y1="330" x2="475" y2="330"/>

  <!-- Ground symbol -->
  <line x1="260" y1="330" x2="260" y2="340"/>
  <line x1="248" y1="340" x2="272" y2="340"/>
  <line x1="252" y1="346" x2="268" y2="346"/>
  <line x1="256" y1="352" x2="264" y2="352"/>

  <!-- junction dots -->
  <g fill="currentColor" stroke="none">
    <circle cx="170" cy="140" r="2.6"/>
    <circle cx="430" cy="140" r="2.6"/>
    <circle cx="300" cy="140" r="2.6"/>
    <circle cx="260" cy="140" r="2.6"/>
    <circle cx="200" cy="230" r="2.6"/>
    <circle cx="300" cy="185" r="2.6"/>
    <circle cx="260" cy="330" r="2.6"/>
    <circle cx="300" cy="330" r="2.6"/>
    <circle cx="470" cy="330" r="2.6"/>
    <circle cx="520" cy="330" r="2.6"/>
  </g>
</g>

<!-- Labels -->
<g fill="currentColor" stroke="none" font-size="13">
  <text x="235" y="118" text-anchor="middle">L1</text>
  <text x="358" y="114" text-anchor="middle">L2</text>
  <text x="300" y="68" text-anchor="middle" font-size="11">C&#160;(tank&#160;capacitor)</text>
  <text x="300" y="177" text-anchor="middle" font-size="10">tap&#160;to&#160;cathode</text>
  <text x="66" y="182" font-size="11">grid&#160;leak&#160;R</text>
  <text x="66" y="196" font-size="10">(self-bias)</text>
  <text x="223" y="212" font-size="10" text-anchor="middle">grid</text>
  <text x="245" y="196" font-size="10" text-anchor="middle">plate</text>
  <text x="266" y="290" font-size="10">cathode</text>
  <text x="315" y="228" font-size="13">V1</text>
  <text x="330" y="245" font-size="11">oscillator&#160;triode</text>
  <text x="418" y="205" font-size="11" text-anchor="middle">RF&#160;choke</text>
  <text x="490" y="248" text-anchor="middle" font-size="12">B+</text>
  <text x="538" y="72" font-size="11">to&#160;antenna</text>
  <text x="538" y="86" font-size="10">(link&#160;coupled)</text>
  <text x="266" y="368" text-anchor="middle" font-size="12">GND</text>
  <text x="30" y="374" font-size="12">Feedback: RF current in the plate-side turns (L2) induces a voltage in the</text>
  <text x="30" y="390" font-size="12">grid-side turns (L1) &#8212; one continuous tapped coil sets both the tank and the loop gain.</text>
</g>
</svg>
