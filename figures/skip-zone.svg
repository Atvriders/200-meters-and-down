<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">

  <!-- Earth surface (curvature exaggerated) and ground hatching -->
  <g fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.75">
    <line x1="14.8" y1="328.6" x2="23.8" y2="339.6"/>
    <line x1="39.6" y1="327.4" x2="48.6" y2="338.4"/>
    <line x1="64.4" y1="326.2" x2="73.4" y2="337.2"/>
    <line x1="89.2" y1="325.2" x2="98.2" y2="336.2"/>
    <line x1="114.0" y1="324.2" x2="123.0" y2="335.2"/>
    <line x1="138.8" y1="323.4" x2="147.8" y2="334.4"/>
    <line x1="163.6" y1="322.7" x2="172.6" y2="333.7"/>
    <line x1="188.4" y1="322.2" x2="197.4" y2="333.2"/>
    <line x1="213.2" y1="321.7" x2="222.2" y2="332.7"/>
    <line x1="238.0" y1="321.4" x2="247.0" y2="332.4"/>
    <line x1="262.8" y1="321.1" x2="271.8" y2="332.1"/>
    <line x1="287.6" y1="321.0" x2="296.6" y2="332.0"/>
    <line x1="312.4" y1="321.0" x2="321.4" y2="332.0"/>
    <line x1="337.2" y1="321.1" x2="346.2" y2="332.1"/>
    <line x1="362.0" y1="321.4" x2="371.0" y2="332.4"/>
    <line x1="386.8" y1="321.7" x2="395.8" y2="332.7"/>
    <line x1="411.6" y1="322.2" x2="420.6" y2="333.2"/>
    <line x1="436.4" y1="322.7" x2="445.4" y2="333.7"/>
    <line x1="461.2" y1="323.4" x2="470.2" y2="334.4"/>
    <line x1="486.0" y1="324.2" x2="495.0" y2="335.2"/>
    <line x1="510.8" y1="325.2" x2="519.8" y2="336.2"/>
    <line x1="535.6" y1="326.2" x2="544.6" y2="337.2"/>
    <line x1="560.4" y1="327.4" x2="569.4" y2="338.4"/>
    <line x1="585.2" y1="328.6" x2="594.2" y2="339.6"/>
  </g>
  <path d="M -10,330 Q 300,312 610,330" fill="none" stroke="currentColor" stroke-width="2.4"/>

  <!-- Ionosphere layer -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="30" y1="74" x2="570" y2="74" stroke-dasharray="8,5"/>
    <line x1="30" y1="94" x2="570" y2="94" stroke-dasharray="8,5"/>
  </g>
  <g stroke="currentColor" stroke-width="1" opacity="0.6">
    <line x1="60" y1="76" x2="55" y2="92"/>
    <line x1="120" y1="76" x2="115" y2="92"/>
    <line x1="180" y1="76" x2="175" y2="92"/>
    <line x1="300" y1="76" x2="295" y2="92"/>
    <line x1="420" y1="76" x2="415" y2="92"/>
    <line x1="480" y1="76" x2="475" y2="92"/>
    <line x1="540" y1="76" x2="535" y2="92"/>
  </g>

  <!-- Sky wave: transmitter -> refracts off ionosphere -> lands at distant receiver -->
  <g fill="none" stroke="currentColor" stroke-width="2.2">
    <path d="M 70,260 L 240,74"/>
    <path d="M 240,74 L 520,258"/>
  </g>
  <!-- direction arrowheads -->
  <g fill="currentColor" stroke="none">
    <path d="M 158,169 L 149,160 L 163,158 Z"/>
    <path d="M 400,182 L 412,177 L 406,190 Z"/>
  </g>

  <!-- Ground wave: short-range surface propagation near the transmitter -->
  <path d="M 74,320 Q 110,309 145,313" fill="none" stroke="currentColor" stroke-width="2.2"/>
  <path d="M 145,313 Q 160,315 172,318" fill="none" stroke="currentColor" stroke-width="2.2" stroke-dasharray="6,5"/>

  <!-- Skip zone bracket -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="175" y1="305" x2="520" y2="305"/>
    <line x1="175" y1="298" x2="175" y2="320"/>
    <line x1="520" y1="298" x2="520" y2="322"/>
  </g>

  <!-- TX tower -->
  <g fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="70" y1="326" x2="70" y2="260"/>
    <line x1="70" y1="260" x2="55" y2="245"/>
    <line x1="70" y1="260" x2="70" y2="238"/>
    <line x1="70" y1="260" x2="85" y2="245"/>
  </g>

  <!-- RX tower -->
  <g fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="520" y1="325.5" x2="520" y2="258"/>
    <line x1="520" y1="258" x2="505" y2="243"/>
    <line x1="520" y1="258" x2="520" y2="236"/>
    <line x1="520" y1="258" x2="535" y2="243"/>
  </g>

  <!-- Skip distance dimension -->
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="70" y1="372" x2="520" y2="372"/>
    <line x1="70" y1="366" x2="70" y2="378"/>
    <line x1="520" y1="366" x2="520" y2="378"/>
  </g>
  <g fill="currentColor" stroke="none">
    <path d="M 70,372 L 80,367 L 80,377 Z"/>
    <path d="M 520,372 L 510,367 L 510,377 Z"/>
  </g>

  <!-- Labels -->
  <g fill="currentColor" stroke="none" font-size="13">
    <text x="300" y="44" text-anchor="middle">IONOSPHERE</text>
    <text x="300" y="60" text-anchor="middle" font-size="11">(refracting&#160;layer)</text>
    <text x="70" y="222" text-anchor="middle">TX</text>
    <text x="70" y="206" text-anchor="middle" font-size="11">transmitter</text>
    <text x="520" y="220" text-anchor="middle">RX</text>
    <text x="520" y="204" text-anchor="middle" font-size="11">distant receiver</text>
    <text x="120" y="145" font-size="12">sky wave</text>
    <text x="120" y="159" font-size="10">(refracted by ionosphere)</text>
    <text x="430" y="118" text-anchor="middle" font-size="11">refracts&#160;back&#160;to&#160;earth</text>
    <text x="60" y="296" font-size="11">ground&#160;wave</text>
    <text x="60" y="330" font-size="10">(limited&#160;range)</text>
    <text x="347" y="291" text-anchor="middle" font-size="13">SKIP&#160;ZONE</text>
    <text x="347" y="317" text-anchor="middle" font-size="10.5">no&#160;reception &#8212; past ground wave, short of the returning sky wave</text>
    <text x="295" y="393" text-anchor="middle" font-size="12">skip distance</text>
    <text x="300" y="358" text-anchor="middle" font-size="10" opacity="0.8">earth (curvature exaggerated)</text>
  </g>
</svg>
