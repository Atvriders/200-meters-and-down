<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <text x="300" y="20" font-size="16" text-anchor="middle" fill="currentColor" stroke="none">SSB by the Phasing Method</text>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <!-- boxes -->
    <rect x="10" y="169" width="70" height="50" rx="5"/>
    <rect x="250" y="63" width="110" height="56" rx="5"/>
    <rect x="250" y="268" width="110" height="56" rx="5"/>
    <rect x="255" y="170" width="100" height="45" rx="5"/>
    <rect x="255" y="225" width="100" height="38" rx="5"/>
    <rect x="105" y="272" width="140" height="48" rx="5"/>
    <circle cx="430" cy="195" r="25"/>
    <rect x="485" y="172" width="95" height="46" rx="5"/>

    <!-- audio split, junction dot -->
    <circle cx="80" cy="194" r="3" fill="currentColor" stroke="none"/>
    <line x1="80" y1="194" x2="248" y2="91" marker-end="url(#arrowP)"/>
    <line x1="80" y1="194" x2="105" y2="296" marker-end="url(#arrowP)"/>
    <line x1="245" y1="296" x2="248" y2="296" marker-end="url(#arrowP)"/>

    <!-- carrier vertical spine -->
    <line x1="290" y1="170" x2="290" y2="121" marker-end="url(#arrowP)"/>
    <line x1="290" y1="215" x2="290" y2="223" marker-end="url(#arrowP)"/>
    <line x1="290" y1="263" x2="290" y2="266" marker-end="url(#arrowP)"/>

    <!-- balanced-modulator outputs into combiner -->
    <line x1="360" y1="91" x2="407" y2="182" marker-end="url(#arrowP)"/>
    <line x1="360" y1="296" x2="407" y2="208" marker-end="url(#arrowP)"/>

    <!-- combiner to output -->
    <line x1="455" y1="195" x2="483" y2="195" marker-end="url(#arrowP)"/>
  </g>

  <g fill="currentColor" stroke="none" text-anchor="middle">
    <text x="45" y="190" font-size="12">AUDIO</text>
    <text x="45" y="206" font-size="12">IN</text>

    <text x="305" y="87" font-size="13">BALANCED</text>
    <text x="305" y="103" font-size="13">MOD A</text>
    <text x="305" y="117" font-size="9">(carrier &amp; audio, 0&#176;)</text>

    <text x="305" y="292" font-size="13">BALANCED</text>
    <text x="305" y="308" font-size="13">MOD B</text>
    <text x="305" y="322" font-size="9">(carrier &amp; audio, 90&#176;)</text>

    <text x="305" y="189" font-size="12">CARRIER</text>
    <text x="305" y="204" font-size="12">OSCILLATOR</text>

    <text x="305" y="240" font-size="10">90&#176; RF</text>
    <text x="305" y="253" font-size="10">PHASE NETWORK</text>

    <text x="175" y="292" font-size="10">90&#176; AUDIO</text>
    <text x="175" y="305" font-size="10">PHASE NETWORK</text>

    <text x="430" y="188" font-size="24" stroke="none">&#931;</text>
    <text x="430" y="240" font-size="12">COMBINER</text>
    <text x="430" y="254" font-size="9">one sideband cancels,</text>
    <text x="430" y="265" font-size="9">the other reinforces</text>

    <text x="532" y="192" font-size="12">SSB OUTPUT</text>
    <text x="532" y="207" font-size="9">(one sideband)</text>

    <text x="152" y="118" font-size="10" text-anchor="start">0&#176; (direct)</text>
    <text x="298" y="145" font-size="10" text-anchor="start">0&#176; (direct)</text>
  </g>
</svg>
