<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <title>Figure 7.1 — PLL frequency synthesizer</title>
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">

    <!-- Crystal reference oscillator -->
    <rect x="30" y="150" width="110" height="60"/>
    <!-- crystal symbol inside -->
    <g stroke-width="1.6">
      <line x1="68" y1="165" x2="68" y2="195"/>
      <line x1="102" y1="165" x2="102" y2="195"/>
      <rect x="76" y="170" width="18" height="20"/>
    </g>

    <!-- Phase detector -->
    <path d="M190,140 L250,140 L270,180 L250,220 L190,220 Z"/>
    <line x1="220" y1="155" x2="235" y2="180"/>
    <line x1="235" y1="180" x2="220" y2="205"/>

    <!-- Loop filter -->
    <rect x="320" y="150" width="110" height="60"/>
    <!-- RC low-pass glyph -->
    <g stroke-width="1.6">
      <line x1="340" y1="180" x2="355" y2="180"/>
      <path d="M355,180 l4,-8 l6,16 l6,-16 l6,16 l6,-16 l4,8"/>
      <line x1="387" y1="180" x2="400" y2="180"/>
      <line x1="400" y1="165" x2="400" y2="195"/>
      <line x1="405" y1="165" x2="405" y2="195"/>
    </g>

    <!-- VCO -->
    <circle cx="500" cy="180" r="45"/>
    <path d="M470,180 q9,-16 18,0 t18,0 t18,0" stroke-width="1.6"/>

    <!-- Output line -->
    <line x1="545" y1="180" x2="575" y2="180"/>
    <path d="M575,180 l-8,-5 l0,10 z" fill="currentColor" stroke="none"/>

    <!-- feedback tap down from output -->
    <line x1="560" y1="180" x2="560" y2="300"/>
    <line x1="560" y1="300" x2="430" y2="300"/>

    <!-- Programmable divider -->
    <rect x="320" y="270" width="110" height="60"/>

    <!-- divider back to phase detector second input -->
    <line x1="320" y1="300" x2="220" y2="300"/>
    <line x1="220" y1="300" x2="220" y2="220"/>
    <path d="M220,220 l-5,-9 l10,0 z" fill="currentColor" stroke="none"/>

    <!-- connectors between main blocks -->
    <line x1="140" y1="180" x2="190" y2="180"/>
    <path d="M190,180 l-8,-5 l0,10 z" fill="currentColor" stroke="none"/>

    <line x1="270" y1="180" x2="320" y2="180"/>
    <path d="M320,180 l-8,-5 l0,10 z" fill="currentColor" stroke="none"/>

    <line x1="430" y1="180" x2="455" y2="180"/>
    <path d="M455,180 l-8,-5 l0,10 z" fill="currentColor" stroke="none"/>

  </g>

  <g fill="currentColor" stroke="none" font-size="13" text-anchor="middle">
    <text x="85" y="140">Crystal reference</text>
    <text x="85" y="230" font-size="12">f_ref</text>

    <text x="230" y="115">Phase</text>
    <text x="230" y="130">detector</text>

    <text x="375" y="140">Loop filter</text>

    <text x="500" y="115">VCO</text>

    <text x="375" y="245">Programmable</text>
    <text x="375" y="260">÷N divider</text>
    <text x="375" y="320" font-size="12">(microprocessor-set N)</text>

    <text x="560" y="165" font-size="13">f_VCO, output</text>
  </g>

  <g fill="currentColor" stroke="none" font-size="16" text-anchor="middle">
    <text x="300" y="375">f_VCO = N &#183; f_ref</text>
  </g>

  <g fill="currentColor" stroke="none" font-size="14" text-anchor="middle" font-style="italic">
    <text x="300" y="30">PLL frequency synthesizer</text>
  </g>
</svg>
