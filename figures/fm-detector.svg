<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="sans-serif">
  <defs>
    <!-- diode pointing right: anode at (0,0)-side, cathode bar at (18,0)-side -->
    <g id="diode-fwd">
      <polygon points="0,-8 0,8 18,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
      <line x1="18" y1="-9" x2="18" y2="9" stroke="currentColor" stroke-width="2.5"/>
    </g>
    <!-- diode pointing left (reversed polarity, for the lower half of the secondary) -->
    <g id="diode-rev">
      <polygon points="18,-8 18,8 0,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
      <line x1="0" y1="-9" x2="0" y2="9" stroke="currentColor" stroke-width="2.5"/>
    </g>
  </defs>

  <!-- ================= main signal chain ================= -->

  <!-- IF input -->
  <text x="12" y="98" font-size="12" fill="currentColor">IF INPUT</text>
  <line x1="12" y1="110" x2="60" y2="110" stroke="currentColor" stroke-width="2.5"/>

  <!-- limiter -->
  <rect x="60" y="82" width="85" height="56" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <text x="102" y="103" font-size="14" fill="currentColor" text-anchor="middle">LIMITER</text>
  <text x="102" y="118" font-size="9.5" fill="currentColor" text-anchor="middle">(clips AM noise,</text>
  <text x="102" y="130" font-size="9.5" fill="currentColor" text-anchor="middle">passes only Δf)</text>

  <!-- discriminator dashed boundary -->
  <rect x="180" y="55" width="270" height="105" stroke="currentColor" stroke-width="1.5" stroke-dasharray="6,5" fill="none"/>
  <text x="315" y="47" font-size="14" fill="currentColor" text-anchor="middle" font-weight="bold">DISCRIMINATOR</text>
  <text x="195" y="65" font-size="9" fill="currentColor" text-anchor="middle">tuned</text>
  <text x="195" y="75" font-size="9" fill="currentColor" text-anchor="middle">transf.</text>

  <!-- limiter output to primary top -->
  <line x1="145" y1="110" x2="160" y2="110" stroke="currentColor" stroke-width="2.5"/>
  <line x1="160" y1="110" x2="160" y2="85" stroke="currentColor" stroke-width="2.5"/>
  <line x1="160" y1="85" x2="195" y2="85" stroke="currentColor" stroke-width="2.5"/>

  <!-- primary coil (bulges left), x=195, y 85-135 -->
  <path d="M195,85 a8,8 0 0 0 0,16.7 a8,8 0 0 0 0,16.7 a8,8 0 0 0 0,16.7"
        stroke="currentColor" stroke-width="2.5" fill="none"/>

  <!-- primary bottom to chassis ground -->
  <line x1="195" y1="135" x2="195" y2="150" stroke="currentColor" stroke-width="2.5"/>
  <line x1="179" y1="150" x2="211" y2="150" stroke="currentColor" stroke-width="2.5"/>
  <line x1="185" y1="156" x2="205" y2="156" stroke="currentColor" stroke-width="2.5"/>
  <line x1="191" y1="162" x2="199" y2="162" stroke="currentColor" stroke-width="2.5"/>

  <!-- core -->
  <line x1="210" y1="78" x2="210" y2="142" stroke="currentColor" stroke-width="2.5"/>
  <line x1="217" y1="78" x2="217" y2="142" stroke="currentColor" stroke-width="2.5"/>

  <!-- secondary coil (bulges right), x=232, y 85-135, center-tapped at y=110 -->
  <path d="M232,85 a8,8 0 0 1 0,16.7 a8,8 0 0 1 0,16.7 a8,8 0 0 1 0,16.7"
        stroke="currentColor" stroke-width="2.5" fill="none"/>

  <!-- center tap -> common/reference node -->
  <line x1="232" y1="110" x2="322" y2="110" stroke="currentColor" stroke-width="2"/>
  <circle cx="255" cy="110" r="3" fill="currentColor"/>
  <text x="258" y="103" font-size="9.5" fill="currentColor">common</text>
  <line x1="322" y1="102" x2="322" y2="118" stroke="currentColor" stroke-width="2"/>

  <!-- top branch: secondary top -> D1 -> R1||C1 -> node A -->
  <line x1="232" y1="85" x2="255" y2="85" stroke="currentColor" stroke-width="2.5"/>
  <use href="#diode-fwd" x="255" y="85"/>
  <text x="264" y="72" font-size="11" fill="currentColor" text-anchor="middle">D1</text>
  <line x1="273" y1="85" x2="290" y2="85" stroke="currentColor" stroke-width="2.5"/>
  <rect x="290" y="68" width="65" height="34" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="322" y="90" font-size="11.5" fill="currentColor" text-anchor="middle">R1 ∥ C1</text>
  <line x1="355" y1="85" x2="400" y2="85" stroke="currentColor" stroke-width="2.5"/>
  <text x="378" y="78" font-size="10" fill="currentColor" text-anchor="middle">V1</text>

  <!-- bottom branch: secondary bottom -> D2 (reversed) -> R2||C2 -> node B -->
  <line x1="232" y1="135" x2="255" y2="135" stroke="currentColor" stroke-width="2.5"/>
  <use href="#diode-rev" x="255" y="135"/>
  <text x="264" y="152" font-size="11" fill="currentColor" text-anchor="middle">D2</text>
  <line x1="273" y1="135" x2="290" y2="135" stroke="currentColor" stroke-width="2.5"/>
  <rect x="290" y="118" width="65" height="34" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="322" y="140" font-size="11.5" fill="currentColor" text-anchor="middle">R2 ∥ C2</text>
  <line x1="355" y1="135" x2="400" y2="135" stroke="currentColor" stroke-width="2.5"/>
  <text x="378" y="150" font-size="10" fill="currentColor" text-anchor="middle">V2</text>

  <!-- sum V1 - V2 -> audio out -->
  <line x1="400" y1="85" x2="430" y2="105" stroke="currentColor" stroke-width="2.5"/>
  <line x1="400" y1="135" x2="430" y2="115" stroke="currentColor" stroke-width="2.5"/>
  <circle cx="430" cy="110" r="4" fill="currentColor"/>
  <line x1="434" y1="110" x2="480" y2="110" stroke="currentColor" stroke-width="2.5"/>
  <polygon points="480,110 470,105 470,115" fill="currentColor"/>
  <text x="500" y="98" font-size="13" fill="currentColor" font-weight="bold">AUDIO OUT</text>
  <text x="500" y="115" font-size="10" fill="currentColor">∝ Δf</text>
  <text x="500" y="129" font-size="10" fill="currentColor">0 V at f₀</text>

  <!-- ================= S-curve inset ================= -->
  <rect x="140" y="195" width="330" height="180" stroke="currentColor" stroke-width="1.5" stroke-dasharray="6,5" fill="none"/>
  <text x="305" y="213" font-size="12.5" fill="currentColor" text-anchor="middle">Discriminator output vs. frequency deviation</text>

  <!-- axes -->
  <line x1="185" y1="300" x2="440" y2="300" stroke="currentColor" stroke-width="2"/>
  <polygon points="440,300 430,295 430,305" fill="currentColor"/>
  <line x1="305" y1="360" x2="305" y2="230" stroke="currentColor" stroke-width="2"/>
  <polygon points="305,230 300,240 310,240" fill="currentColor"/>
  <text x="445" y="304" font-size="12" fill="currentColor">Δf</text>
  <text x="310" y="228" font-size="12" fill="currentColor">Vout</text>

  <!-- S-curve: rotated sigmoid, zero-crossing at f0 -->
  <path d="M215,347 C255,347 255,300 305,300 C355,300 355,253 395,253"
        stroke="currentColor" stroke-width="3" fill="none"/>

  <line x1="305" y1="296" x2="305" y2="304" stroke="currentColor" stroke-width="2"/>
  <text x="305" y="320" font-size="11" fill="currentColor" text-anchor="middle">f₀ (center freq.)</text>
  <text x="215" y="365" font-size="10" fill="currentColor" text-anchor="middle">−Δf</text>
  <text x="395" y="365" font-size="10" fill="currentColor" text-anchor="middle">+Δf</text>
</svg>
