<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="sans-serif">

  <!-- ================= antenna ================= -->
  <text x="300" y="14" font-size="12.5" fill="currentColor" text-anchor="middle">ANTENNA (shared TX/RX)</text>
  <line x1="300" y1="20" x2="300" y2="55" stroke="currentColor" stroke-width="2.5"/>
  <line x1="288" y1="27" x2="312" y2="27" stroke="currentColor" stroke-width="2"/>
  <line x1="288" y1="40" x2="312" y2="40" stroke="currentColor" stroke-width="2"/>
  <text x="317" y="49" font-size="9" fill="currentColor">shared feedline (RX + TX)</text>

  <!-- feedline into duplexer -->
  <line x1="300" y1="55" x2="300" y2="90" stroke="currentColor" stroke-width="2.5"/>

  <!-- ================= duplexer ================= -->
  <rect x="245" y="90" width="110" height="42" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <text x="300" y="110" font-size="13.5" fill="currentColor" text-anchor="middle" font-weight="bold">DUPLEXER</text>
  <text x="300" y="124" font-size="9" fill="currentColor" text-anchor="middle">(band-pass / notch filter pair)</text>

  <!-- duplexer -> receiver -->
  <line x1="267" y1="132" x2="267" y2="148" stroke="currentColor" stroke-width="2.5"/>
  <line x1="267" y1="148" x2="160" y2="148" stroke="currentColor" stroke-width="2.5"/>
  <line x1="160" y1="148" x2="160" y2="170" stroke="currentColor" stroke-width="2.5"/>

  <!-- duplexer -> transmitter -->
  <line x1="333" y1="132" x2="333" y2="148" stroke="currentColor" stroke-width="2.5"/>
  <line x1="333" y1="148" x2="440" y2="148" stroke="currentColor" stroke-width="2.5"/>
  <line x1="440" y1="148" x2="440" y2="170" stroke="currentColor" stroke-width="2.5"/>

  <!-- ================= receiver ================= -->
  <rect x="90" y="170" width="140" height="52" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <text x="160" y="192" font-size="14" fill="currentColor" text-anchor="middle" font-weight="bold">RECEIVER</text>
  <text x="160" y="208" font-size="9.5" fill="currentColor" text-anchor="middle">f_RX = 146.940 MHz (input)</text>

  <!-- ================= transmitter ================= -->
  <rect x="370" y="170" width="140" height="52" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <text x="440" y="192" font-size="14" fill="currentColor" text-anchor="middle" font-weight="bold">TRANSMITTER</text>
  <text x="440" y="208" font-size="9.5" fill="currentColor" text-anchor="middle">f_TX = 146.340 MHz (−600 kHz)</text>

  <!-- receiver -> controller -->
  <line x1="160" y1="222" x2="160" y2="245" stroke="currentColor" stroke-width="2.5"/>
  <line x1="160" y1="245" x2="230" y2="245" stroke="currentColor" stroke-width="2.5"/>
  <line x1="230" y1="245" x2="230" y2="268" stroke="currentColor" stroke-width="2.5"/>
  <polygon points="230,268 225,258 235,258" fill="currentColor"/>
  <text x="166" y="240" font-size="9.5" fill="currentColor">RX audio</text>

  <!-- controller -> transmitter -->
  <line x1="370" y1="268" x2="370" y2="245" stroke="currentColor" stroke-width="2.5"/>
  <line x1="370" y1="245" x2="440" y2="245" stroke="currentColor" stroke-width="2.5"/>
  <line x1="440" y1="245" x2="440" y2="222" stroke="currentColor" stroke-width="2.5"/>
  <polygon points="440,222 435,232 445,232" fill="currentColor"/>
  <text x="376" y="240" font-size="9.5" fill="currentColor">audio + PTT</text>

  <!-- ================= controller ================= -->
  <rect x="205" y="268" width="190" height="55" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <text x="300" y="288" font-size="13" fill="currentColor" text-anchor="middle" font-weight="bold">REPEATER CONTROLLER</text>
  <text x="300" y="302" font-size="8.5" fill="currentColor" text-anchor="middle">links RX → TX; CTCSS decode (access) /</text>
  <text x="300" y="313" font-size="8.5" fill="currentColor" text-anchor="middle">encode (TX tone); timeout; station ID</text>

  <!-- ================= offset / frequency axis ================= -->
  <text x="300" y="344" font-size="11" fill="currentColor" text-anchor="middle">standard 2 m offset: 600 kHz</text>
  <path d="M225,354 L225,348 L375,348 L375,354" stroke="currentColor" stroke-width="1.5" fill="none"/>

  <line x1="140" y1="368" x2="460" y2="368" stroke="currentColor" stroke-width="2"/>
  <polygon points="460,368 450,363 450,373" fill="currentColor"/>
  <text x="472" y="372" font-size="11" fill="currentColor" font-style="italic">f</text>

  <line x1="225" y1="361" x2="225" y2="375" stroke="currentColor" stroke-width="2"/>
  <line x1="375" y1="361" x2="375" y2="375" stroke="currentColor" stroke-width="2"/>

  <text x="225" y="388" font-size="10.5" fill="currentColor" text-anchor="middle">f_RX</text>
  <text x="225" y="398" font-size="9" fill="currentColor" text-anchor="middle">146.940</text>
  <text x="375" y="388" font-size="10.5" fill="currentColor" text-anchor="middle">f_TX</text>
  <text x="375" y="398" font-size="9" fill="currentColor" text-anchor="middle">146.340</text>
</svg>
