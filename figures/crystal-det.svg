<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Helvetica, Arial, sans-serif">
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== Antenna ===== -->
    <line x1="80" y1="90" x2="80" y2="45"/>
    <circle cx="80" cy="40" r="4"/>
    <path d="M88,55 L100,42 M92,64 L106,53" stroke-width="1.3"/>

    <!-- ===== Ground ===== -->
    <line x1="80" y1="310" x2="80" y2="345"/>
    <line x1="65" y1="345" x2="95" y2="345"/>
    <line x1="70" y1="352" x2="90" y2="352"/>
    <line x1="75" y1="359" x2="85" y2="359"/>

    <!-- ===== Top / bottom rails ===== -->
    <line x1="80" y1="90" x2="340" y2="90"/>
    <line x1="80" y1="310" x2="460" y2="310"/>
    <circle cx="170" cy="90" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="250" cy="90" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="340" cy="90" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="170" cy="310" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="250" cy="310" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="340" cy="310" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="460" cy="310" r="2.5" fill="currentColor" stroke="none"/>

    <!-- ===== L: tuning coil (parallel branch) ===== -->
    <path d="M170,90 Q190,112 170,134 Q150,156 170,178 Q190,200 170,222 Q150,244 170,266 Q190,288 170,310" stroke-width="2.2"/>

    <!-- ===== C: variable tuning condenser (parallel branch) ===== -->
    <line x1="250" y1="90" x2="250" y2="185"/>
    <line x1="233" y1="185" x2="267" y2="185"/>
    <line x1="233" y1="196" x2="267" y2="196"/>
    <line x1="250" y1="196" x2="250" y2="310"/>
    <line x1="222" y1="206" x2="272" y2="172" stroke-width="1.6"/>
    <path d="M272,172 L263,175 M272,172 L268,181" stroke-width="1.6"/>

    <!-- ===== Crystal detector: cat's-whisker point-contact on galena, drawn as a diode ===== -->
    <line x1="340" y1="90" x2="340" y2="140"/>
    <path d="M325,140 L340,162 L355,140 Z"/>
    <circle cx="340" cy="162" r="2" fill="currentColor" stroke="none"/>
    <path d="M330,164 L352,162 L364,176 L358,193 L340,199 L322,191 L317,177 Z"/>
    <line x1="340" y1="199" x2="340" y2="210"/>

    <!-- P2 junction -->
    <circle cx="340" cy="210" r="2.5" fill="currentColor" stroke="none"/>

    <!-- ===== Cb: RF bypass condenser across the headphones ===== -->
    <line x1="340" y1="210" x2="340" y2="260"/>
    <line x1="323" y1="260" x2="357" y2="260"/>
    <line x1="323" y1="270" x2="357" y2="270"/>
    <line x1="340" y1="270" x2="340" y2="310"/>

    <!-- ===== Headphones ===== -->
    <line x1="340" y1="210" x2="500" y2="210"/>
    <line x1="500" y1="210" x2="500" y2="168"/>
    <line x1="460" y1="168" x2="460" y2="310"/>
    <path d="M460,132 Q480,108 500,132" stroke-width="2"/>
    <circle cx="460" cy="150" r="18"/>
    <circle cx="500" cy="150" r="18"/>
    <line x1="445" y1="150" x2="475" y2="150" stroke-width="1.4"/>
    <line x1="485" y1="150" x2="515" y2="150" stroke-width="1.4"/>

  </g>

  <!-- ===== Labels ===== -->
  <g fill="currentColor" stroke="none" font-size="11">
    <text x="300" y="20" text-anchor="middle" font-size="13" font-weight="bold">CRYSTAL DETECTOR RECEIVER</text>

    <text x="80" y="24" text-anchor="middle" font-size="11">ANTENNA</text>
    <text x="80" y="378" text-anchor="middle" font-size="11">GROUND</text>

    <text x="133" y="176" text-anchor="end" font-size="12" font-weight="bold">L</text>
    <text x="133" y="190" text-anchor="end" font-size="9">(TUNING COIL)</text>

    <text x="272" y="192" text-anchor="start" font-size="12" font-weight="bold">C</text>
    <text x="272" y="206" text-anchor="start" font-size="9">(VARIABLE)</text>

    <text x="372" y="146" text-anchor="start" font-size="11">CRYSTAL</text>
    <text x="372" y="159" text-anchor="start" font-size="11">DETECTOR</text>
    <text x="372" y="176" text-anchor="start" font-size="9">(cat's-whisker point</text>
    <text x="372" y="188" text-anchor="start" font-size="9">contact on galena)</text>

    <text x="362" y="248" text-anchor="start" font-size="11">Cb</text>
    <text x="362" y="261" text-anchor="start" font-size="9">(RF BYPASS)</text>

    <text x="522" y="146" text-anchor="start" font-size="11">HEADPHONES</text>
  </g>
</svg>
