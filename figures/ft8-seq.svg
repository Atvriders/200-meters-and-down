<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Helvetica, Arial, sans-serif">
  <!-- ============ Row labels ============ -->
  <text x="5" y="64" font-size="12" font-weight="bold" fill="currentColor">Station A</text>
  <text x="5" y="184" font-size="12" font-weight="bold" fill="currentColor">Station B</text>

  <!-- ============ 15 s slot-width callout ============ -->
  <line x1="60" y1="50" x2="140" y2="50" stroke="currentColor" stroke-width="1"/>
  <path d="M60,50 L67,46 L67,54 Z" fill="currentColor"/>
  <path d="M140,50 L133,46 L133,54 Z" fill="currentColor"/>
  <text x="100" y="42" text-anchor="middle" font-size="11" fill="currentColor">15 s slot</text>

  <!-- ============ Slot divider guides ============ -->
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="2,3" opacity="0.6">
    <line x1="60"  y1="60" x2="60"  y2="260"/>
    <line x1="140" y1="60" x2="140" y2="260"/>
    <line x1="220" y1="60" x2="220" y2="260"/>
    <line x1="300" y1="60" x2="300" y2="260"/>
    <line x1="380" y1="60" x2="380" y2="260"/>
    <line x1="460" y1="60" x2="460" y2="260"/>
    <line x1="540" y1="60" x2="540" y2="260"/>
  </g>

  <!-- ============ Row A slots (y 70-130) ============ -->
  <!-- slot 0: A transmits CQ -->
  <rect x="62" y="70" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="100" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">CQ</text>
  <text x="100" y="112" text-anchor="middle" font-size="7.5" fill="currentColor">CQ N1AA FN42</text>

  <!-- slot 1: A receiving/decoding -->
  <rect x="142" y="70" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="180" y="104" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- slot 2: A transmits signal report -->
  <rect x="222" y="70" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="260" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">REPORT</text>
  <text x="260" y="112" text-anchor="middle" font-size="7.5" fill="currentColor">W5BB N1AA -14</text>

  <!-- slot 3: A receiving -->
  <rect x="302" y="70" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="340" y="104" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- slot 4: A transmits RRR -->
  <rect x="382" y="70" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="420" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">RRR</text>
  <text x="420" y="112" text-anchor="middle" font-size="7.5" fill="currentColor">W5BB N1AA RRR</text>

  <!-- slot 5: A receiving final 73 -->
  <rect x="462" y="70" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="500" y="104" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- ============ Row B slots (y 190-250) ============ -->
  <!-- slot 0: B receiving/decoding CQ -->
  <rect x="62" y="190" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="100" y="224" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- slot 1: B transmits grid -->
  <rect x="142" y="190" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="180" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">GRID</text>
  <text x="180" y="232" text-anchor="middle" font-size="7.5" fill="currentColor">N1AA W5BB EM10</text>

  <!-- slot 2: B receiving -->
  <rect x="222" y="190" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="260" y="224" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- slot 3: B transmits R+report -->
  <rect x="302" y="190" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="340" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">R+REPORT</text>
  <text x="340" y="232" text-anchor="middle" font-size="7.5" fill="currentColor">N1AA W5BB R-09</text>

  <!-- slot 4: B receiving -->
  <rect x="382" y="190" width="76" height="60" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="420" y="224" text-anchor="middle" font-size="10" fill="currentColor">RX / decode</text>

  <!-- slot 5: B transmits 73 (sign-off) -->
  <rect x="462" y="190" width="76" height="60" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="500" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">73</text>
  <text x="500" y="232" text-anchor="middle" font-size="7.5" fill="currentColor">N1AA W5BB 73</text>

  <!-- ============ Time axis ============ -->
  <line x1="60" y1="270" x2="540" y2="270" stroke="currentColor" stroke-width="1.5"/>
  <g font-size="10" fill="currentColor" text-anchor="middle">
    <line x1="60"  y1="266" x2="60"  y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="60" y="286">0</text>
    <line x1="140" y1="266" x2="140" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="140" y="286">15</text>
    <line x1="220" y1="266" x2="220" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="220" y="286">30</text>
    <line x1="300" y1="266" x2="300" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="300" y="286">45</text>
    <line x1="380" y1="266" x2="380" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="380" y="286">60</text>
    <line x1="460" y1="266" x2="460" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="460" y="286">75</text>
    <line x1="540" y1="266" x2="540" y2="274" stroke="currentColor" stroke-width="1"/>
    <text x="540" y="286">90 s</text>
  </g>

  <!-- ============ Legend ============ -->
  <rect x="60" y="304" width="20" height="14" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="86" y="315" font-size="10" fill="currentColor">transmitting</text>
  <rect x="180" y="304" width="20" height="14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <text x="206" y="315" font-size="10" fill="currentColor">receiving / decoding</text>

  <!-- ============ Footnote ============ -->
  <text x="300" y="345" text-anchor="middle" font-size="11" fill="currentColor">Each station's radio clock is synchronized (e.g. via GPS/NTP) to the 15-second UTC slot boundary.</text>
  <text x="300" y="362" text-anchor="middle" font-size="11" fill="currentColor">FT8 decodes reliably at roughly &#8722;20 to &#8722;24 dB SNR in a 2500 Hz bandwidth &#8212; well below audible noise.</text>
</svg>
