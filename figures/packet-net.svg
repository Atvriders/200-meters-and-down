<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <title>Figure 7.4 — Packet network with a digipeater</title>

  <g fill="currentColor" stroke="none" font-size="14" text-anchor="middle" font-style="italic">
    <text x="300" y="26">Packet network: relaying through a digipeater</text>
  </g>

  <!-- ================= Digipeater node (elevated, center) ================= -->
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- hill -->
    <path d="M240,300 Q300,240 360,300 Z"/>
    <!-- mast -->
    <line x1="300" y1="240" x2="300" y2="150"/>
    <!-- antenna elements -->
    <line x1="285" y1="155" x2="315" y2="155"/>
    <line x1="288" y1="168" x2="312" y2="168"/>
    <line x1="291" y1="181" x2="309" y2="181"/>
    <!-- TNC + radio box at node -->
    <rect x="255" y="300" width="90" height="34"/>
  </g>
  <g fill="currentColor" stroke="none" font-size="12" text-anchor="middle">
    <text x="300" y="321">TNC + radio</text>
  </g>
  <g fill="currentColor" stroke="none" font-size="13" text-anchor="middle">
    <text x="300" y="140">Digipeater / node</text>
  </g>

  <!-- ================= Station A (left) ================= -->
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- mast -->
    <line x1="80" y1="330" x2="80" y2="220"/>
    <line x1="68" y1="225" x2="92" y2="225"/>
    <line x1="71" y1="238" x2="89" y2="238"/>
    <line x1="74" y1="251" x2="86" y2="251"/>
    <!-- station box -->
    <rect x="35" y="330" width="90" height="34"/>
  </g>
  <g fill="currentColor" stroke="none" font-size="12" text-anchor="middle">
    <text x="80" y="351">TNC + radio</text>
  </g>
  <g fill="currentColor" stroke="none" font-size="13" text-anchor="middle">
    <text x="80" y="390">Station A</text>
  </g>

  <!-- ================= Station B (right) ================= -->
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <line x1="520" y1="330" x2="520" y2="220"/>
    <line x1="508" y1="225" x2="532" y2="225"/>
    <line x1="511" y1="238" x2="529" y2="238"/>
    <line x1="514" y1="251" x2="526" y2="251"/>
    <rect x="475" y="330" width="90" height="34"/>
  </g>
  <g fill="currentColor" stroke="none" font-size="12" text-anchor="middle">
    <text x="520" y="351">TNC + radio</text>
  </g>
  <g fill="currentColor" stroke="none" font-size="13" text-anchor="middle">
    <text x="520" y="390">Station B</text>
  </g>

  <!-- ================= RF links A<->node and node<->B ================= -->
  <g stroke="currentColor" fill="none" stroke-width="1.6" stroke-dasharray="6,5">
    <line x1="94" y1="222" x2="278" y2="168"/>
    <line x1="506" y1="222" x2="322" y2="168"/>
  </g>
  <!-- arrowheads (both directions implied by pairs) -->
  <g fill="currentColor" stroke="none">
    <path d="M100,220 l-12,2 l7,10 z"/>
    <path d="M272,170 l12,-2 l-7,-10 z"/>
    <path d="M500,220 l12,2 l-7,10 z"/>
    <path d="M328,170 l-12,-2 l7,-10 z"/>
  </g>
  <g fill="currentColor" stroke="none" font-size="11" text-anchor="middle">
    <text x="150" y="185" transform="rotate(-24 150 185)">RF link (VHF FM, AX.25)</text>
    <text x="450" y="185" transform="rotate(24 450 185)">RF link (VHF FM, AX.25)</text>
  </g>

  <!-- ================= no-direct-path indicator between A and B ================= -->
  <g stroke="currentColor" fill="none" stroke-width="1.2" stroke-dasharray="3,4">
    <line x1="126" y1="347" x2="474" y2="347"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.6">
    <line x1="292" y1="339" x2="308" y2="355"/>
    <line x1="308" y1="339" x2="292" y2="355"/>
  </g>
  <g fill="currentColor" stroke="none" font-size="11" text-anchor="middle">
    <text x="300" y="375" font-style="italic">A and B are out of direct range</text>
  </g>

  <g fill="currentColor" stroke="none" font-size="12" text-anchor="middle">
    <text x="300" y="55">Frames relayed hop-by-hop: A &#8594; digipeater &#8594; B (and back)</text>
  </g>

</svg>
