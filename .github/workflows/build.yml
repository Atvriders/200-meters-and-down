name: build-docker-image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    # Gitea Actions also reads .github/workflows — this job is GitHub-only;
    # Gitea builds via .gitea/workflows/build.yml instead.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch audiobook from release v1.0
        run: |
          mkdir -p audiobook
          base="https://github.com/Atvriders/200-meters-and-down/releases/download/v1.0"
          curl -sSfL -o audiobook/intro.mp3 "$base/intro.mp3"
          # 8 voices: ryan -> chNN.mp3, the rest -> <voice>-chNN.mp3
          : > urls.txt
          for i in $(seq -f "%02g" 0 9); do
            echo "$base/ch${i}.mp3 audiobook/ch${i}.mp3" >> urls.txt
            for v in andrew ava sonia william natasha connor emily; do
              echo "$base/${v}-ch${i}.mp3 audiobook/${v}-ch${i}.mp3" >> urls.txt
            done
          done
          xargs -P 8 -n 2 sh -c 'curl -sSfL -o "$2" "$1"' _ < urls.txt
          rm -f urls.txt
          echo "audiobook files: $(ls audiobook | wc -l)"

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Build the book (HTML/TXT/PDF)
        run: |
          pip install -r requirements.txt
          python3 -m playwright install --with-deps chromium || true   # optional; PDF is best-effort
          python3 tools/build_book.py --html --txt --pdf --out build/

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/atvriders/200-meters-and-down:latest
          labels: org.opencontainers.image.source=https://github.com/Atvriders/200-meters-and-down
